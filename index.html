<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightPulse | Strategic Decision Architecture</title>

    <style>
        :root{
            --bg:#06090f;
            --panel:#0f1722;
            --panel2:#111c2b;
            --primary:#00ff88;
            --secondary:#4a7ab5;
            --text:#e8edf5;
            --muted:#8ea0b8;
            --danger:#ff4d4d;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background: radial-gradient(circle at top, #0d1623 0%, #06090f 55%);
            color:var(--text);
            font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            line-height:1.6;
        }

        nav{
            position:sticky;
            top:0;
            z-index:1000;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:18px 7%;

            background:rgba(5,10,18,0.92);
            backdrop-filter:blur(10px);

            border-bottom:1px solid rgba(0,255,136,0.12);
        }

        .logo-wrap{
            display:flex;
            align-items:center;
            gap:16px;
            text-decoration:none;
        }

        .logo-wrap img{
            height:60px;
            width:auto;
        }

        .logo-text{
            color:var(--primary);
            border:1px solid rgba(0,255,136,0.35);
            padding:10px 18px;
            border-radius:10px;
            letter-spacing:2px;
            font-weight:700;
            font-size:1rem;
            background:rgba(0,255,136,0.04);
        }

        .status-box{
            text-align:right;
            font-family:monospace;
            font-size:.75rem;
            color:var(--muted);
            line-height:1.6;
        }

        .online-dot{
            color:var(--primary);
        }

        .hero{
            padding:90px 7% 40px;
            text-align:center;
        }

        .hero h1{
            font-size:4rem;
            line-height:1.1;
            letter-spacing:4px;
            margin-bottom:24px;
            text-transform:uppercase;
        }

        .hero-sub{
            color:var(--primary);
            font-family:monospace;
            letter-spacing:2px;
            font-size:1rem;
            margin-bottom:30px;
        }

        .hero-desc{
            max-width:1000px;
            margin:0 auto;
            color:var(--muted);
            font-size:1.08rem;
        }

        .hero-buttons{
            margin-top:40px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .btn-primary{
            background:var(--primary);
            color:#04110a;
            padding:14px 28px;
            border-radius:10px;
            text-decoration:none;
            font-weight:700;
            transition:.3s;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
            box-shadow:0 0 20px rgba(0,255,136,0.25);
        }

        .btn-secondary{
            border:1px solid rgba(255,255,255,0.15);
            color:white;
            padding:14px 28px;
            border-radius:10px;
            text-decoration:none;
            transition:.3s;
        }

        .btn-secondary:hover{
            border-color:var(--primary);
            color:var(--primary);
        }

        .section{
            padding:80px 7%;
        }

        .section-title{
            font-size:2rem;
            margin-bottom:20px;
            text-transform:uppercase;
            letter-spacing:2px;
        }

        .section-sub{
            color:var(--muted);
            max-width:1000px;
            margin-bottom:50px;
        }

        .interface-image{
            width:100%;
            border-radius:18px;
            border:1px solid rgba(0,255,136,0.15);
            box-shadow:0 0 45px rgba(0,255,136,0.08);
        }

        .video-label{
            margin-top:60px;
            margin-bottom:18px;

            color:var(--primary);
            text-align:center;
            font-family:monospace;
            letter-spacing:2px;
            font-size:.82rem;
        }

        .video-container{
            position:relative;
            width:100%;
            padding-bottom:56.25%;
            height:0;
            overflow:hidden;

            border-radius:18px;
            border:1px solid rgba(0,255,136,0.18);

            box-shadow:0 0 50px rgba(0,255,136,0.08);

            background:black;
        }

        .video-container iframe{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:28px;
        }

        .card{
            background:linear-gradient(180deg, #101826 0%, #0b111a 100%);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:18px;
            padding:30px;
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            border-color:rgba(0,255,136,0.25);
            box-shadow:0 0 35px rgba(0,255,136,0.08);
        }

        .card h3{
            margin-bottom:18px;
            color:var(--primary);
            letter-spacing:1px;
        }

        .card p{
            color:var(--muted);
            font-size:.95rem;
        }

        .architecture{
            background:linear-gradient(180deg,#09111b 0%,#05080d 100%);
            border-top:1px solid rgba(0,255,136,0.08);
            border-bottom:1px solid
